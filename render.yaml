# Blueprint de Render: web (Docker) + Postgres gratuito.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: prueba-tecnica-tareas
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: prueba-tecnica-db
          property: connectionString
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false

databases:
  - name: prueba-tecnica-db
    plan: free
    databaseName: tareas
    user: tareas
